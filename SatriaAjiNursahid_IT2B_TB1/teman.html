  <style>
    /* Mengatur body agar flexbox utama bekerja dengan baik */
    body {

    }

    .main-content {

      display: flex;

    }

    /* --- STYLE HEADER ALA SCREENSHOT --- */
    .family-header {
      text-align: center;
      margin-bottom: 50px;
      width: 100%;
    }

    .section-title-large {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 8vw, 5rem);
      text-transform: uppercase;
      color: #F4D738;
      margin: 0;
      line-height: 1;
      -webkit-text-stroke: 2px black;
      text-shadow: 8px 8px 0px black;
    }

    .intro-box {
      background: white;
      border: 4px solid black;
      padding: 15px 30px;
      display: inline-block;
      /* DIBERIKAN JARAK KE ATAS */
      margin-top: 25px; 
      box-shadow: 10px 10px 0px black;
      position: relative;
      z-index: 2;
    }

    .intro-box p {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      margin: 0;
      color: black;
    }

    /* --- KOTAK TABEL (PEMBUNGKUS BARU) --- */
    .table-container-box {
      background-color: #fdfd96; /* Warna kuning soft agar kontras */
      border: 5px solid black;
      padding: 40px;
      box-shadow: 15px 15px 0px black;
      margin-top: 20px;
      max-width: 1050px;
      display: flex;
      justify-content: center;
    }

    /* --- GRID CONTAINER --- */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1000px;
    }

    .flip-card {
      width: 200px;
      height: 280px;
      perspective: 1000px;
    }

    .flip-control {
      display: none;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
      display: block;
    }

    .flip-control:checked + .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front, .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      box-sizing: border-box; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      margin: 0;
      border: 3px solid black;
    }

    .flip-card-back {
      background-color: #F4D738;
      color: black;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 15px; 
      text-align: center;
    }

    .flip-card-front {
      background-color: #bbb;
    }

    .flip-card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* --- NAVBAR --- */
    .nav-menu ul {
      list-style: none;
      display: flex;
      gap: 20px;
      padding: 0;
    }

    .nav-menu ul li a {
      text-decoration: none;
      color: #000;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      padding: 5px 15px;
      border: 3px solid transparent;
      transition: all 0.2s;
    }

    .nav-menu ul li a.active {
      background: #F4D738;
      border: 3px solid #000;
      box-shadow: 4px 4px 0px #000;
      color: #000;
    }

    .sparkle {
      font-size: 3rem;
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 1100px) {
        .table-container-box { width: 90%; padding: 20px; }
        .grid-container { grid-template-columns: repeat(2, 1fr); }
        .flip-card { width: 100%; max-width: 200px; }
    }
  </style>
</head>
